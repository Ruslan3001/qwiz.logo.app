<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Quiz App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Car Quiz">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --font-size: 40px; /* Базовый размер шрифта по умолчанию */
            --bg-color: #f4f4f9;
            --text-color: #333;
            --btn-border: 3px solid #333;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Шапка с гамбургером и статистикой */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 20px;
        }

        .hamburger div {
            height: 3px;
            background-color: var(--text-color);
            border-radius: 2px;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Главное меню */
        #menu-overlay {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            transition: left 0.3s ease;
        }

        #menu-overlay.active {
            left: 0;
        }

        .menu-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background-color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .close-btn {
            align-self: flex-end;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .menu-content button, .menu-content label {
            font-size: 1.2rem;
            padding: 10px;
            border: var(--btn-border);
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            text-align: center;
        }

        .menu-content input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-top: 5px;
        }

        /* Контейнеры экранов */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .screen.active {
            display: flex;
        }

        /* Кнопки главного экрана */
        .mode-btn {
            font-size: 1.5rem;
            padding: 15px 30px;
            margin: 10px;
            width: 100%;
            max-width: 400px;
            border: var(--btn-border);
            border-radius: 12px;
            background-color: white;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .mode-btn:active {
            transform: scale(0.98);
        }

        /* Экран викторины */
        .image-container {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 16/9;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .loader {
            font-size: 1.5rem;
            font-weight: bold;
            color: #666;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            /* Применяем настраиваемый размер шрифта */
            font-size: var(--font-size); 
            padding: 15px 20px;
            border: var(--btn-border);
            border-radius: 12px;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            word-wrap: break-word;
        }

        /* Состояния ответов */
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
        }

        .option-btn.incorrect {
            background-color: var(--incorrect-color);
            color: white;
            border-color: var(--incorrect-color);
        }

        .option-btn.correct-outline {
            border: 4px solid var(--correct-color);
        }

        /* Анимация серпантина (Confetti) */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 30px;
            opacity: 0.8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }
        
        .title {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

        </div>

            <div>Время: <span id="timer">00:00</span></div>

            <button onclick="updatePhotosCache(true)">Обновить базу фото</button>
            <div>

            </div>
            <button onclick="goToStart()">На главную</button>
        </div>
    </div>

    <!-- Стартовый экран -->
    <main id="start-screen" class="screen active">
        <h1 class="title">Car Quiz</h1>
        <button class="mode-btn" onclick="startQuiz('emblems')">По эмблеме</button>
        <button class="mode-btn" onclick="startQuiz('internet')">По фото из сети</button>
    </main>

    <!-- Экран викторины -->
    <main id="quiz-screen" class="screen">
        <div class="image-container" id="question-image">
            <!-- Сюда вставляется SVG -->
        </div>
        <div class="options-grid" id="options-container">
            <!-- Кнопки вариантов ответов генерируются JS -->
        </div>
    </main>

    <!-- Контейнер для анимации конфетти -->
    <div id="confetti-container"></div>

                { answer: "ZX Auto", url: "Logo%20png/4c50600d372d0f4eac75cd079a8dd572_MD5.jpg" }
            ]
        };
        /* ================= КОНЕЦ БЛОКА ДАННЫХ ======================= */

        // Состояние приложения
        let CAR_PHOTOS = {};
        let currentMode = null;
        let questionsList = [];
        let currentQuestionIndex = 0;
        
        let totalAsked = 0;
        let correctAnswersCount = 0;
        
        let timerSeconds = 0;
        let timerInterval = null;
        let isPaused = false;
        let isAnswering = false; // Блокировка кнопок во время анимации

        // Инициализация при загрузке
        window.onload = async () => {
            updateFontSize(40); // Выставляем 40px по умолчанию
            await initPhotosData(); // Загружаем базу ссылок на фото
        };

        async function initPhotosData() {
            const cachedData = localStorage.getItem('carPhotosData');
            if (cachedData) {
                try {
                    CAR_PHOTOS = JSON.parse(cachedData);
                    console.log('База фото загружена из кэша устройства.');
                    return;
                } catch (e) {
                    console.error('Ошибка чтения кэша', e);
                }
            }
            await updatePhotosCache(false);
        }

        async function updatePhotosCache(showAlert = false) {
            try {
                // Добавляем параметр 'no-store' чтобы точно скачать свежий файл с сервера
                const response = await fetch('photos_data.json', { cache: 'no-store' });
                if (!response.ok) throw new Error('Файл не найден');
                
                CAR_PHOTOS = await response.json();
                localStorage.setItem('carPhotosData', JSON.stringify(CAR_PHOTOS));
                
                if (showAlert) alert('База фотографий успешно скачана и сохранена на устройстве!');
                console.log('Данные фото скачаны из файла и сохранены в кэш.');
            } catch (error) {
                console.error("Ошибка обновления базы фото:", error);
                if (showAlert) alert('Не удалось загрузить файл photos_data.json. Проверьте соединение.');
            }
        }

        // --- Управление интерфейсом и навигация ---

        function toggleMenu() {
            const menu = document.getElementById('menu-overlay');
            menu.classList.toggle('active');
        }

        function handleMenuOverlayClick(event) {
            if (event.target.id === 'menu-overlay') {
                toggleMenu();
            }
        }

        function updateFontSize(size) {
            document.documentElement.style.setProperty('--font-size', size + 'px');
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goToStart() {
            stopTimer();
            currentMode = null; // Сбрасываем режим
            switchScreen('start-screen');
            toggleMenu();
        }

        function startQuiz(mode) {
            currentMode = mode;
            questionsList = [...CAR_DATA.emblems]; // В обоих режимах бренд берем из списка emblems
            // Перемешиваем вопросы
            questionsList.sort(() => Math.random() - 0.5); 
            
            currentQuestionIndex = 0;
            switchScreen('quiz-screen');
            loadQuestion();
            
            if (!timerInterval) {
                startTimer();
            }
        }

        // --- Логика Викторины ---

        function loadQuestion() {
            isAnswering = false;
            
            // Если вопросы закончились, начинаем сначала (зацикливаем)
            if (currentQuestionIndex >= questionsList.length) {
                currentQuestionIndex = 0;
                questionsList.sort(() => Math.random() - 0.5);
            }

            const question = questionsList[currentQuestionIndex];
            
            const imageContainer = document.getElementById('question-image');
            const optionsContainer = document.getElementById('options-container');
            
            // Показываем индикатор загрузки и скрываем старые кнопки
            imageContainer.innerHTML = '<div class="loader">Загрузка изображения...</div>';
            optionsContainer.innerHTML = '';
            
            const img = new Image();
            
            // Вынесем функцию успешной загрузки фото (URL мог прийти из сети)
            const handleImageReady = () => {
                // Прерываем отрисовку, если пользователь уже нажал "На главную"
                if (!currentMode) return;
                
                imageContainer.innerHTML = '';
                imageContainer.appendChild(img);

                // Генерируем варианты ответов: 1 правильный + 3 случайных неправильных
                const allAnswers = [...new Set(questionsList.map(q => q.answer))];
                const wrongAnswers = allAnswers.filter(a => a !== question.answer).sort(() => 0.5 - Math.random()).slice(0, 3);
                const shuffledOptions = [question.answer, ...wrongAnswers].sort(() => Math.random() - 0.5);

                shuffledOptions.forEach(optionText => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = optionText;
                    btn.onclick = (e) => handleAnswer(e.target, optionText, question.answer);
                    optionsContainer.appendChild(btn);
                });

                // Увеличиваем счетчик показанных вопросов
                totalAsked++;
                updateStatsUI();
            };
            
            img.onload = handleImageReady;
            
            img.onerror = () => {
                if (!currentMode) return;
                imageContainer.innerHTML = '<div class="loader" style="color: red;">Ошибка загрузки. Пропуск...</div>';
                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 1500);
            };
            
            if (currentMode === 'emblems') {
                img.src = question.url;
            } else if (currentMode === 'internet') {
                // Асинхронно ищем картинку, затем подставляем в src
                fetchCarImageFromWeb(question.answer).then(url => {
                    img.src = url;
                });
            }
        }

        // Функция генерации картинки-заглушки (работает мгновенно без интернета)
        function getFallbackImage(text) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300"><rect width="100%" height="100%" fill="#eeeeee"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#333333">${text}</text></svg>`;
            return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
        }

        async function fetchCarImageFromWeb(brand) {
            // Очищаем название от корпоративных суффиксов, чтобы поиск машины был точнее
            const cleanBrand = brand.replace(/Motors?|Corporation|Group|Auto|Company|Inc\.?/ig, '').trim();
            
            // 1. ПРОВЕРКА ЛОКАЛЬНОЙ БАЗЫ: Если ссылка есть в нашей таблице, отдаем её моментально
            if (CAR_PHOTOS && CAR_PHOTOS[brand] && CAR_PHOTOS[brand].length > 0) {
                const urls = CAR_PHOTOS[brand];
                return urls[Math.floor(Math.random() * urls.length)]; // Берем случайное фото из заготовленных
            }

            // 2. РЕЗЕРВНЫЙ ПОИСК: Если в базе пусто, делаем быстрый запрос к API Википедии (origin=* обходит CORS)
            const searchQuery = encodeURIComponent(`"${cleanBrand}" автомобиль`);
            const apiUrl = `https://ru.wikipedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrnamespace=6&gsrsearch=${searchQuery}&gsrlimit=5&prop=imageinfo&iiprop=url&iiurlwidth=500`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.query && data.query.pages) {
                    const pages = Object.values(data.query.pages);
                    for (const p of pages) {
                        if (p.imageinfo && p.imageinfo[0] && p.imageinfo[0].thumburl) {
                            const url = p.imageinfo[0].thumburl;
                            // Отсеиваем логотипы (векторные изображения)
                            if (!url.toLowerCase().endsWith('.svg')) {
                                return url;
                            }
                        }
                    }
                }
                
                // Надежная заглушка без интернета, если фото не найдено
                return getFallbackImage(`Фото не найдено: ${cleanBrand}`);
            } catch (error) {
                console.error("Ошибка поиска фото:", error);
                return getFallbackImage('Ошибка сети или поиск занял слишком много времени');
            }
        }

        function handleAnswer(btnElement, selectedAnswer, correctAnswer) {
            if (isAnswering || isPaused) return;
            isAnswering = true;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedAnswer === correctAnswer) {
                // Правильный ответ
                btnElement.classList.add('correct');
                correctAnswersCount++;
                shootConfetti();
            } else {
                // Неправильный ответ
                btnElement.classList.add('incorrect');
                // Подсвечиваем правильный ответ обводкой
                buttons.forEach(btn => {
                    if (btn.innerText === correctAnswer) {
                        btn.classList.add('correct-outline');
                    }
                });
            }

            updateStatsUI();
            
            // Переход к следующему вопросу через паузу в 1.5 секунды
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }

        // --- Таймер и Статистика ---

        function updateStatsUI() {
            document.getElementById('total-asked').innerText = totalAsked;
            document.getElementById('correct-answers').innerText = correctAnswersCount;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timerSeconds++;
                    document.getElementById('timer').innerText = formatTime(timerSeconds);
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.innerText = isPaused ? "Возобновить" : "Пауза";
            
            if (isPaused) {
                document.getElementById('question-image').style.opacity = '0.1'; // Скрываем вопрос на паузе
            } else {
                document.getElementById('question-image').style.opacity = '1';
            }
        }

        function resetApp() {
            totalAsked = 0;
            correctAnswersCount = 0;
            timerSeconds = 0;
            isPaused = false;
            
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('pause-btn').innerText = "Пауза";
            updateStatsUI();
            
            if (currentMode) {
                currentQuestionIndex = 0;
                loadQuestion();
                document.getElementById('question-image').style.opacity = '1';
            }
            toggleMenu();
        }

        // --- Эффект Серпантина (Confetti) ---

        function shootConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
            
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                
                // Случайная позиция, цвет и скорость
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                confetti.style.transform = `scale(${Math.random() * 0.5 + 0.5})`;
                
                container.appendChild(confetti);
                
                // Удаляем элемент после завершения анимации
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }
    </script>
